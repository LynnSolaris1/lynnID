<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Connection ID</title>
<style>
  :root{
    --bg: #2b2b2e;
    --panel: #38383c;
    --panel-2: #414146;
    --border: #4c4c50;
    --text: #ececec;
    --text-dim: #a8a8a8;
    --accent: #6c6c72;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }
  #settingsBtn{
    position:absolute;
    top:20px;
    right:20px;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    width:42px;
    height:42px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .15s ease;
  }
  #settingsBtn:hover{ background:var(--panel-2); }

  .center-panel{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
    padding:40px;
  }
  .label{
    font-size:13px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--text-dim);
  }
  #idDisplay{
    font-size:34px;
    font-weight:600;
    letter-spacing:2px;
    padding:18px 34px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    min-width:260px;
    text-align:center;
    filter:blur(10px);
    user-select:none;
    transition:filter .2s ease;
  }
  #idDisplay.revealed{
    filter:blur(0);
    user-select:text;
  }
  .btn-row{
    display:flex;
    gap:12px;
  }
  button.action{
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 20px;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    transition:background .15s ease;
  }
  button.action:hover{ background:var(--panel-2); }
  button.action:active{ transform:scale(0.97); }

  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:10;
  }
  .overlay.open{ display:flex; }
  .modal{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:26px 28px;
    width:300px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .modal h3{
    margin:0 0 4px 0;
    font-size:16px;
    font-weight:600;
    color:var(--text);
  }
  .field label{
    display:block;
    font-size:12px;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--border);
    color:var(--text);
    padding:10px 12px;
    border-radius:8px;
    font-size:14px;
  }
  .field input:focus{
    outline:none;
    border-color:var(--accent);
  }
  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:6px;
  }
  .modal-actions button{
    padding:8px 16px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--panel-2);
    color:var(--text);
    cursor:pointer;
    font-size:13px;
  }
  .modal-actions button.primary{
    background:var(--accent);
    border-color:var(--accent);
  }
  .msg{
    font-size:12px;
    min-height:16px;
    color:#e08a8a;
  }
  .msg.ok{ color:#8ac98a; }

  .status{
    position:absolute;
    bottom:24px;
    font-size:12px;
    color:var(--text-dim);
  }
</style>
</head>
<body>

  <button id="settingsBtn" title="Change connection ID">&#9881;</button>

  <div class="center-panel">
    <div class="label">Connection ID</div>
    <div id="idDisplay">--------</div>
    <div class="btn-row">
      <button class="action" id="revealBtn">Reveal</button>
      <button class="action" id="copyBtn">Copy</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h3>Change connection ID</h3>
      <div class="field">
        <label for="usernameInput">Username</label>
        <input type="text" id="usernameInput" placeholder="Enter username" autocomplete="off">
      </div>
      <div class="field">
        <label for="newIdInput">New connection ID</label>
        <input type="text" id="newIdInput" placeholder="Enter new ID" autocomplete="off">
      </div>
      <div class="msg" id="modalMsg"></div>
      <div class="modal-actions">
        <button id="cancelBtn">Cancel</button>
        <button class="primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

<script>
const ALLOWED_USER = "LyNN";
const STORAGE_KEY = "connection_id";

const idDisplay = document.getElementById('idDisplay');
const revealBtn = document.getElementById('revealBtn');
const copyBtn = document.getElementById('copyBtn');
const settingsBtn = document.getElementById('settingsBtn');
const overlay = document.getElementById('overlay');
const cancelBtn = document.getElementById('cancelBtn');
const saveBtn = document.getElementById('saveBtn');
const usernameInput = document.getElementById('usernameInput');
const newIdInput = document.getElementById('newIdInput');
const modalMsg = document.getElementById('modalMsg');
const statusEl = document.getElementById('status');

let currentId = "";
let revealed = false;

async function loadId(){
  try{
    const result = await window.storage.get(STORAGE_KEY, true);
    currentId = (result && result.value) ? result.value : "";
  }catch(e){
    currentId = "";
  }
  renderId();
}

function renderId(){
  idDisplay.textContent = currentId ? currentId : "not set";
}

revealBtn.addEventListener('click', () => {
  revealed = !revealed;
  idDisplay.classList.toggle('revealed', revealed);
  revealBtn.textContent = revealed ? "Hide" : "Reveal";
});

copyBtn.addEventListener('click', async () => {
  if(!currentId){
    flashStatus("Nothing to copy");
    return;
  }
  try{
    await navigator.clipboard.writeText(currentId);
    flashStatus("Copied to clipboard");
  }catch(e){
    flashStatus("Copy failed");
  }
});

function flashStatus(text){
  statusEl.textContent = text;
  setTimeout(() => { statusEl.textContent = ""; }, 2000);
}

settingsBtn.addEventListener('click', () => {
  usernameInput.value = "";
  newIdInput.value = "";
  modalMsg.textContent = "";
  modalMsg.classList.remove('ok');
  overlay.classList.add('open');
  usernameInput.focus();
});

cancelBtn.addEventListener('click', () => {
  overlay.classList.remove('open');
});

overlay.addEventListener('click', (e) => {
  if(e.target === overlay) overlay.classList.remove('open');
});

saveBtn.addEventListener('click', async () => {
  const user = usernameInput.value.trim();
  const newId = newIdInput.value.trim();

  if(user !== ALLOWED_USER){
    modalMsg.classList.remove('ok');
    modalMsg.textContent = "Incorrect username.";
    return;
  }
  if(!newId){
    modalMsg.classList.remove('ok');
    modalMsg.textContent = "Enter a connection ID.";
    return;
  }

  try{
    const result = await window.storage.set(STORAGE_KEY, newId, true);
    if(!result){
      modalMsg.classList.remove('ok');
      modalMsg.textContent = "Save failed, try again.";
      return;
    }
    currentId = newId;
    renderId();
    modalMsg.classList.add('ok');
    modalMsg.textContent = "Saved.";
    setTimeout(() => { overlay.classList.remove('open'); }, 600);
  }catch(e){
    modalMsg.classList.remove('ok');
    modalMsg.textContent = "Save failed, try again.";
  }
});

loadId();
</script>

</body>
</html>
